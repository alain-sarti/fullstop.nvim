name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Install stylua
        env:
          STYLUA_VERSION: 2.5.2
        run: |
          curl -fsSL -o stylua.zip \
            "https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip"
          mkdir -p "$HOME/.local/bin"
          unzip -o stylua.zip -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/stylua"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint + format check
        run: make lint format-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      # Compile the typescript + tsx parsers from committed grammar sources — a
      # fresh runner has none. Self-contained (needs only cc + git).
      - name: Build treesitter parsers
        run: make parsers

      - name: Run tests
        run: make test
